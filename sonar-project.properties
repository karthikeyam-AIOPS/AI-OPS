# SonarQube Configuration for AI-OPS
sonar.projectKey=ai-ops-toolkit
sonar.projectName=AI-OPS Toolkit
sonar.projectVersion=0.1.0
sonar.organization=karthikeyam-aiops

# Source code configuration
sonar.sources=ai_ops,Forecasting
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.language=py

# Python specific settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/env/**,**/.git/**,**/node_modules/**,**/*.log
sonar.test.exclusions=tests/**

# Coverage settings
sonar.coverage.exclusions=tests/**,**/__init__.py,**/migrations/**

# Code smells and bugs
sonar.python.pylint.reportPath=pylint-report.txt
sonar.python.flake8.reportPath=flake8-report.txt

# Quality gate
sonar.qualitygate.wait=true

# Links
sonar.links.homepage=https://github.com/karthikeyam-AIOPS/AI-OPS
sonar.links.scm=https://github.com/karthikeyam-AIOPS/AI-OPS
sonar.links.issue=https://github.com/karthikeyam-AIOPS/AI-OPS/issues