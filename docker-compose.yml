services:
  redis:
    image: redis:7-alpine
    container_name: ragapi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NGROK_AUTH_TOKEN=${NGROK_AUTH_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data

volumes:
  redis_data:
  sqlite_data:
