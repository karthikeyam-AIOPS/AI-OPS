name: Tests and Reports

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-html pytest-xvs coverage
        pip install -r requirements.txt
        
    - name: Run tests with coverage
      run: |
        pytest tests/test_simple.py --cov=ai_ops --cov-report=xml --cov-report=html --cov-report=term-missing --html=test-report.html --self-contained-html -v
        
    - name: Generate coverage badge
      run: |
        coverage report --show-missing
        COVERAGE=$(coverage report --format=total)
        echo "Coverage: $COVERAGE%"
        
    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-reports
        path: |
          coverage.xml
          htmlcov/
          
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports
        path: |
          .coverage\n          test-report.html
          
    - name: Coverage comment
      run: |
        echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        coverage report >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY