name: CI — Tests & Coverage Reports

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-html coverage
        pip install -r requirements.txt
        
    - name: Run tests with coverage
      run: |
        pytest tests/test_simple.py --cov=ai_ops --cov-report=xml --cov-report=html --cov-report=term-missing --html=test-report.html --self-contained-html --junitxml=test-results.xml -v
        
    - name: Generate coverage badge
      run: |
        coverage report --show-missing
        COVERAGE=$(coverage report --format=total)
        echo "Coverage: $COVERAGE%"
        
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: |
          coverage.xml
          htmlcov/
          
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          .coverage
          test-report.html
          
    - name: Write job summary
      if: always()
      run: |
        echo "## CI — Tests & Coverage Reports Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Python version | $(python --version 2>&1) |" >> $GITHUB_STEP_SUMMARY
        echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f test-results.xml ]; then
          TOTAL=$(grep -oP 'tests="\K[0-9]+' test-results.xml | head -1)
          FAILED=$(grep -oP 'failures="\K[0-9]+' test-results.xml | head -1)
          ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml | head -1)
          PASSED=$(( TOTAL - FAILED - ERRORS ))
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed  | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed  | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Errors  | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Total   | $TOTAL |" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        coverage report --show-missing >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY