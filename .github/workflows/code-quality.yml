name: Code Quality Check

on:
  pull_request:
    paths:
      - '**.py'
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for SonarQube analysis

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        echo "✅ Linting tools installed"

    - name: Run black (code formatting)
      run: |
        echo "🔧 Checking code formatting with black..."
        black --check ai_ops Forecasting || true
        black --diff ai_ops Forecasting || true
      continue-on-error: true

    - name: Run isort (import sorting)  
      run: |
        echo "📦 Checking import sorting with isort..."
        isort --check-only ai_ops Forecasting || true
        isort --diff ai_ops Forecasting || true
      continue-on-error: true

    - name: Run flake8 (style guide)
      run: |
        echo "📏 Running flake8 style checks..."
        flake8 ai_ops Forecasting --output-file=flake8-report.txt --tee || echo "Flake8 completed with issues" > flake8-report.txt
      continue-on-error: true

    - name: Run pylint (code analysis)
      run: |
        echo "🔍 Running pylint code analysis..."
        pylint ai_ops --output=pylint-report.txt --output-format=parseable || echo "Pylint completed with issues" > pylint-report.txt
      continue-on-error: true

    - name: Run bandit (security analysis)
      run: |
        echo "🔒 Running bandit security analysis..."
        bandit -r ai_ops Forecasting -f json -o bandit-report.json || echo '{"results": [], "error": "bandit failed"}' > bandit-report.json
      continue-on-error: true

    - name: Run safety (dependency security check)
      run: |
        echo "🛡️ Running safety dependency check..."
        safety check --json --output safety-report.json || echo '{"vulnerabilities": [], "error": "safety failed"}' > safety-report.json
      continue-on-error: true

    - name: Run mypy (type checking)
      run: |
        echo "🔤 Running mypy type checking..."
        mypy ai_ops Forecasting --ignore-missing-imports || true
      continue-on-error: true

    - name: Upload Quality Reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: quality-reports
        path: |
          flake8-report.txt
          pylint-report.txt
          bandit-report.json
          safety-report.json
        retention-days: 30
        if-no-files-found: ignore