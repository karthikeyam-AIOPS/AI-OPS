name: CI — Quick Smoke Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Test basic functionality
      run: |
        echo "✅ Python setup complete"
        python --version
        python -c "print('✅ Python is working')"

    - name: Install Black formatter
      run: pip install black

    - name: Check code formatting with Black
      run: black --check --diff ai_ops/ Forecasting/ tests/

    - name: Install pytest
      run: pip install pytest

    - name: Run tests
      run: pytest tests/test_simple.py -v

    - name: Run tests (with JUnit output)
      run: pytest tests/test_simple.py -v --junitxml=test-results.xml

    - name: Run basic validation
      run: |
        python -c "assert 2 + 2 == 4"
        python -c "assert 'hello'.upper() == 'HELLO'"
        echo "Basic validation passed"

    - name: Write job summary
      if: always()
      run: |
        echo "## CI — Quick Smoke Tests Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Python version | $(python --version 2>&1) |" >> $GITHUB_STEP_SUMMARY
        echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f test-results.xml ]; then
          TOTAL=$(grep -oP 'tests="\K[0-9]+' test-results.xml | head -1)
          FAILED=$(grep -oP 'failures="\K[0-9]+' test-results.xml | head -1)
          ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml | head -1)
          PASSED=$(( TOTAL - FAILED - ERRORS ))
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed  | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed  | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Errors  | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Total   | $TOTAL |" >> $GITHUB_STEP_SUMMARY
        fi