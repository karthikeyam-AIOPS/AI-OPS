name: Basic CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core dependencies first
        pip install typer rich
        echo "✅ Core dependencies installed"

    - name: Install package
      run: |
        pip install -e .
        echo "✅ Package installation complete"

    - name: Test imports
      run: |
        echo "📦 Testing imports..."
        python -c "import ai_ops; print('✅ ai_ops package imports successfully')"
        python -c "from ai_ops import __version__; print(f'✅ Version: {__version__}')"
        
    - name: Test CLI availability
      run: |
        echo "🔧 Testing CLI..."
        python -c "from ai_ops.main import app; print('✅ CLI module available')"
        
    - name: Test Forecasting module (optional)
      run: |
        echo "📈 Testing Forecasting module..."
        python -c "
        try:
            import sys
            from pathlib import Path
            sys.path.append('Forecasting')
            from capacity_forecasting_demo import CapacityInference
            print('✅ Forecasting module imports successfully')
        except Exception as e:
            print(f'⚠️  Forecasting module: {e}')
        " || echo "⚠️ Forecasting test skipped"

    - name: Run smoke tests
      run: |
        if [ -f "tests/test_smoke.py" ]; then
          echo "🧪 Running smoke tests..."
          pip install pytest
          python -m pytest tests/test_smoke.py -v
        else
          echo "⚠️ No smoke tests found, running basic validation..."
          python -c "
          import ai_ops
          print('✅ Basic package validation passed')
          "
        fi