# Allure Report Configuration
allure.results.directory=allure-results
allure.link.issue.pattern=https://github.com/karthikeyam-AIOPS/AI-OPS/issues/{}
allure.link.tms.pattern=https://github.com/karthikeyam-AIOPS/AI-OPS/issues/{}

# Test categories
categories:
  - name: "Product defects"
    matchedStatuses:
      - failed
    messageRegex: ".*Assertion.*"
    
  - name: "Test defects"  
    matchedStatuses:
      - broken
    messageRegex: ".*"
    
  - name: "Ignored tests"
    matchedStatuses:
      - skipped
    messageRegex: ".*"

# Environment configuration
environment.properties=allure-results/environment.properties